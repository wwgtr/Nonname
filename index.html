<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معدن الحكمة - أمير المؤمنين</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particlesCanvas"></canvas>
    
    <div class="container">
        <header>
            <h1>معدن الحكمة</h1>
            <p class="subtitle">AL-IMAM ALI BIN ABI TALIB</p>
        </header>

        <main>
            <div class="main-card" id="quoteCard">
                <div class="card-title" id="cardCategory">حكمة</div>
                <div class="quote-wrapper">
                    <span class="quote-mark">﴿</span>
                    <div id="quoteContent" class="quote-content">جارٍ التحميل...</div>
                    <div id="poetryContent" class="poetry-box" style="display: none;"></div>
                    <span class="quote-mark">﴾</span>
                </div>
            </div>

            <div class="action-hub">
                <div class="control-buttons">
                    <button id="copyBtn" class="btn-circle" title="نسخ">📋</button>
                    <button id="saveBtn" class="btn-circle" title="حفظ">🖼️</button>
                    <button id="shareBtn" class="btn-circle" title="مشاركة">🔗</button>
                    <button id="settingsBtn" class="btn-circle" title="إعدادات">⚙️</button>
                </div>

                <nav class="sections-nav">
                    <a href="index.html" class="nav-item active">الحكم</a>
                    <a href="poetry.html" class="nav-item">الشعر</a>
                    <a href="quotes.html" class="nav-item">الاقتباسات</a>
                    <a href="bios.html" class="nav-item">النبذات</a>
                    <a href="about.html" class="nav-item">حول</a>
                </nav>

                <div class="nav-arrows">
                    <button id="prevBtn" class="arrow-btn">◀</button>
                    <button id="nextBtn" class="arrow-btn">▶</button>
                </div>
            </div>
        </main>

        <footer class="footer-rights">
            <p>DESIGN BY <span>MANUS AI</span></p>
            <p>INSTA : <span>NE_7U</span> | TELEGRAM : <span>WWGTR</span></p>
        </footer>
    </div>

    <!-- Modals -->
    <div id="saveModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeSave">&times;</span>
            <h2 style="color:var(--gold); margin-bottom:20px; text-align:center;">تصدير العمل</h2>
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:10px; font-size:0.8em; opacity:0.7;">اختر القياس</label>
                <select id="formatSelect" style="width:100%; padding:12px; background:#111; border:1px solid var(--gold); color:#fff; border-radius:10px;"></select>
            </div>
            <button id="confirmSave" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:15px; font-weight:bold; cursor:pointer;">تأكيد الحفظ</button>
        </div>
    </div>

    <canvas id="imageCanvas" style="display:none;"></canvas>
    <div id="toast" class="toast"></div>

    <script>window.currentSection = 'home';</script>
    <script src="quotes_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
