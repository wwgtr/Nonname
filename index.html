<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أقوال الإمام علي (ع) - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-card {
            text-align: center;
            padding: 20px;
        }
        .welcome-card h2 {
            color: #d4a843;
            font-family: 'Amiri', serif;
            font-size: 1.8em;
            margin-bottom: 20px;
        }
        .sections-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .main-nav-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,168,67,0.15);
            border-radius: 15px;
            padding: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .main-nav-card:hover {
            background: rgba(212,168,67,0.1);
            transform: translateY(-5px);
            border-color: #d4a843;
        }
        .main-nav-card .icon { font-size: 2.5em; }
        .main-nav-card .title { color: #d4a843; font-weight: bold; font-size: 1.2em; }
        .main-nav-card .desc { color: rgba(255,255,255,0.5); font-size: 0.85em; }
        
        .footer-info {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8em;
            color: rgba(255,255,255,0.3);
            font-family: 'Amiri', serif;
        }
    </style>
</head>
<body>
    <canvas id="particlesCanvas"></canvas>
    <div class="container">
        <header>
            <h1>أقوال الإمام علي</h1>
            <p class="subtitle">علي بن أبي طالب (عليه السلام)</p>
        </header>
        
        <div class="welcome-card">
            <h2>مرحباً بك في رحاب الحكمة</h2>
            <div class="sections-grid">
                <a href="quotes.html" class="main-nav-card">
                    <span class="icon">📜</span>
                    <span class="title">الاقتباسات</span>
                    <span class="desc">حكم وأقوال بليغة ومختصرة</span>
                </a>
                <a href="poetry.html" class="main-nav-card">
                    <span class="icon">✒️</span>
                    <span class="title">الشعر</span>
                    <span class="desc">قصائد وأبيات منسوبة للإمام</span>
                </a>
                <a href="bios.html" class="main-nav-card">
                    <span class="icon">📖</span>
                    <span class="title">النبذات</span>
                    <span class="desc">سيرة وحياة أمير المؤمنين</span>
                </a>
            </div>
        </div>

        <div class="footer-info">
            جميع الحقوق محفوظة © insta : ne_7u
        </div>
    </div>

    <script>
        // نظام الشرار البسيط للصفحة الرئيسية
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        for(let i=0; i<50; i++) {
            particles.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                size: Math.random()*2+1, speedY: -Math.random()*1-0.5,
                opacity: Math.random()
            });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                p.y += p.speedY;
                if(p.y < -10) p.y = canvas.height+10;
                ctx.fillStyle = `rgba(212,168,67,${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
