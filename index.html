<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player Pro</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box;}
        button { background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
        .video-container { margin-top: 20px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .ua-box { background: #1e293b; padding: 15px; border-radius: 8px; margin-top: 10px;}
        label { font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h2>مشغل البث الاحترافي</h2>
    
    <input type="text" id="streamUrl" placeholder="أدخل رابط m3u8 هنا...">
    
    <div class="ua-box">
        <label>User-Agent:</label>
        <input type="text" id="uaInput" placeholder="User-Agent...">
        <button onclick="generateUA()">توليد عشوائي</button>
    </div>

    <button onclick="loadStream()">تشغيل البث</button>

    <div class="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="800" height="450">
            <p class="vjs-no-js">يرجى تفعيل الجافا سكريبت لتشغيل الفيديو.</p>
        </video>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const player = videojs('my-video');

    // وضع القيم الافتراضية المطلوبة
    document.getElementById('streamUrl').value = "http://het101b.ycn-redirect.com/live/918454578001/index.m3u8?t=P93H65rxLY2EYBA3mEgpsQ&e=1779796246";
    document.getElementById('uaInput').value = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36";

    function generateUA() {
        const uas = [
            "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36",
            "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1",
            "Mozilla/5.0 (Linux; Android 13; SM-S901B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36"
        ];
        document.getElementById('uaInput').value = uas[Math.floor(Math.random() * uas.length)];
    }

    function loadStream() {
        const url = document.getElementById('streamUrl').value;
        if(url) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }
    }
</script>
</body>
</html>
