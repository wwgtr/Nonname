<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أشعار الإمام علي - الشعر</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particlesCanvas"></canvas>
    <div class="container" id="mainContainer">
        <header>
            <h1>عناوين الأشعار</h1>
            <p class="subtitle">ديوان أمير المؤمنين (عليه السلام)</p>
        </header>
        
        <!-- واجهة القائمة -->
        <div id="listContainer" class="list-container">
            <input type="text" id="searchInput" placeholder="ابحث عن عنوان قصيدة...">
            <div id="itemsList" class="items-list">جارٍ تحميل العناوين...</div>
        </div>

        <!-- واجهة العرض -->
        <div id="viewContainer" class="view-container">
            <div class="back-to-list" id="backToList"><span>→</span> العودة للعناوين</div>
            
            <div class="quote-card" id="quoteCard">
                <div id="contentTitle" class="content-title"></div>
                <div class="quote-text">
                    <span class="quote-mark">﴿</span>
                    <div class="quote-content-wrapper">
                        <div id="quoteContent" class="quote-main-text" style="display: none;"></div>
                        <div id="poetryContent" class="poetry-container"></div>
                    </div>
                    <span class="quote-mark">﴾</span>
                </div>
            </div>

            <div class="controls">
                <button id="copyBtn" class="btn btn-primary">نسخ الشعر</button>
                <button id="saveBtn" class="btn btn-success">حفظ</button>
                <button id="shareBtn" class="btn btn-share">مشاركة</button>
                <button id="settingsBtn" class="btn btn-settings">⚙️</button>
            </div>

            <div class="navigation">
                <button id="prevBtn" class="nav-btn">السابق</button>
                <button id="nextBtn" class="nav-btn">التالي</button>
            </div>
        </div>

        <div class="main-sections-nav">
            <a href="quotes.html" class="section-btn">الاقتباسات</a>
            <a href="poetry.html" class="section-btn active">الشعر <span id="poetryWarningIcon">⚠️</span></a>
            <a href="bios.html" class="section-btn">النبذات</a>
        </div>
    </div>

    <!-- Modals -->
    <div id="poetryWarningModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closePoetryWarning">&times;</span>
            <div style="text-align: center; padding: 20px;">
                <span style="font-size: 3em; display: block; margin-bottom: 15px;">⚠️</span>
                <p style="font-size: 1.1em; line-height: 1.6; color: #f5f0e8;">هذه الأشعار منسوبة للأمام علي عليه السلام، مدى صحتها غير معروف، أو إذا تم التلاعب بها.</p>
                <button class="save-btn-confirm" style="margin-top: 20px;" id="confirmPoetryWarning">فهمت ذلك</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeSettings">&times;</span>
            <h2>الإعدادات</h2>
            <div class="settings-group">
                <label>حجم الخط</label>
                <select id="fontSizeSelect">
                    <option value="small">صغير</option>
                    <option value="medium" selected>متوسط</option>
                    <option value="large">كبير</option>
                </select>
            </div>
            <div class="toggle-switch" id="darkModeToggle">
                <span>الوضع الداكن</span>
                <div class="toggle-track" id="darkModeTrack"></div>
            </div>
        </div>
    </div>

    <div id="saveModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeSave">&times;</span>
            <h2>حفظ التصميم</h2>
            <div class="settings-group">
                <label>التنسيق</label>
                <select id="formatSelect"></select>
            </div>
            <div class="bg-grid" id="bgGrid"></div>
            <button id="confirmSave" class="save-btn-confirm">تأكيد الحفظ</button>
        </div>
    </div>

    <canvas id="imageCanvas" style="display:none;"></canvas>
    <div id="toast" class="toast"></div>

    <script>window.currentSection = 'poetry';</script>
    <script src="poetry_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
