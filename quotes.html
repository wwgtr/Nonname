<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معدن الحكمة - الاقتباسات</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particlesCanvas"></canvas>
    <div class="container">
        <header>
            <h1>الاقتباسات</h1>
            <p class="subtitle">SELECTED QUOTES</p>
        </header>
        <main>
            <div id="listContainer">
                <input type="text" id="searchInput" placeholder="ابحث في الاقتباسات..." style="width:100%; padding:15px; background:rgba(255,255,255,0.03); border:1px solid rgba(212,168,67,0.2); border-radius:15px; color:#fff; margin-bottom:20px;">
                <div id="itemsList" class="list-view"></div>
            </div>
            <div id="viewContainer" style="display:none;">
                <button id="backToList" style="background:none; border:none; color:var(--gold); cursor:pointer; margin-bottom:15px; font-size:0.9em;">← العودة للقائمة</button>
                <div class="main-card" id="quoteCard">
                    <div class="card-title" id="cardCategory">اقتباس</div>
                    <div class="quote-wrapper">
                        <span class="quote-mark">﴿</span>
                        <div id="quoteContent" class="quote-content"></div>
                        <div id="poetryContent" class="poetry-box" style="display:none;"></div>
                        <span class="quote-mark">﴾</span>
                    </div>
                </div>
                <div class="action-hub">
                    <div class="control-buttons">
                        <button id="copyBtn" class="btn-circle">📋</button>
                        <button id="saveBtn" class="btn-circle">🖼️</button>
                        <button id="shareBtn" class="btn-circle">🔗</button>
                    </div>
                    <div class="nav-arrows">
                        <button id="prevBtn" class="arrow-btn">◀</button>
                        <button id="nextBtn" class="arrow-btn">▶</button>
                    </div>
                </div>
            </div>
            <nav class="sections-nav" style="margin-top:30px;">
                <a href="index.html" class="nav-item">الحكم</a>
                <a href="poetry.html" class="nav-item">الشعر</a>
                <a href="quotes.html" class="nav-item active">الاقتباسات</a>
                <a href="bios.html" class="nav-item">النبذات</a>
            </nav>
        </main>
        <footer class="footer-rights">
            <p>DESIGN BY <span>MANUS AI</span></p>
            <p>INSTA : <span>NE_7U</span> | TELEGRAM : <span>NE_7U</span></p>
        </footer>
    </div>
    <div id="saveModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeSave">&times;</span>
            <h2 style="color:var(--gold); margin-bottom:20px; text-align:center;">تصدير</h2>
            <select id="formatSelect" style="width:100%; padding:12px; background:#111; border:1px solid var(--gold); color:#fff; border-radius:10px; margin-bottom:20px;"></select>
            <button id="confirmSave" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:15px; font-weight:bold; cursor:pointer;">تأكيد</button>
        </div>
    </div>
    <canvas id="imageCanvas" style="display:none;"></canvas>
    <div id="toast" class="toast"></div>
    <script>window.currentSection = 'quotes';</script>
    <script src="quotes_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
