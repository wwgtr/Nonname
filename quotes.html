<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أقوال الإمام علي - الاقتباسات</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particlesCanvas"></canvas>
    <div class="container" id="mainContainer">
        <header>
            <h1>عناوين الاقتباسات</h1>
            <p class="subtitle">حكم ومواعظ مختارة</p>
        </header>
        
        <div id="listContainer" class="list-container">
            <input type="text" id="searchInput" placeholder="ابحث عن عنوان...">
            <div id="itemsList" class="items-list"></div>
        </div>

        <div id="viewContainer" class="view-container">
            <div class="back-to-list" id="backToList"><span>→</span> العودة للعناوين</div>
            
            <div class="quote-card" id="quoteCard">
                <div id="contentTitle" class="content-title"></div>
                <div class="quote-text">
                    <span class="quote-mark">﴿</span>
                    <div class="quote-content-wrapper">
                        <div id="quoteContent" class="quote-main-text"></div>
                        <div id="poetryContent" class="poetry-container" style="display: none;"></div>
                    </div>
                    <span class="quote-mark">﴾</span>
                </div>
            </div>

            <div class="action-buttons">
                <div class="controls">
                    <button id="copyBtn" class="btn btn-primary">نسخ النص</button>
                    <button id="saveBtn" class="btn btn-success">حفظ</button>
                    <button id="shareBtn" class="btn btn-share">مشاركة</button>
                    <button id="settingsBtn" class="btn btn-settings">⚙️</button>
                </div>

                <div class="section-links-middle">
                    <a href="index.html" class="btn-mini">الحكم والأقوال</a>
                    <a href="poetry.html" class="btn-mini">الشعر</a>
                    <a href="quotes.html" class="btn-mini active">الاقتباسات</a>
                    <a href="bios.html" class="btn-mini">النبذات</a>
                </div>

                <div class="navigation">
                    <button id="prevBtn" class="nav-btn">السابق</button>
                    <button id="nextBtn" class="nav-btn">التالي</button>
                </div>
            </div>
        </div>
    </div>

    <div id="saveModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeSave">&times;</span>
            <h2>حفظ الصورة</h2>
            <div class="settings-group">
                <label>التنسيق</label>
                <select id="formatSelect"></select>
            </div>
            <div class="bg-grid" id="bgGrid"></div>
            <button id="confirmSave" class="save-btn-confirm">تأكيد الحفظ</button>
        </div>
    </div>

    <canvas id="imageCanvas" style="display:none;"></canvas>
    <div id="toast" class="toast"></div>

    <script>window.currentSection = 'quotes';</script>
    <script src="quotes_data.js"></script>
    <script src="extra_quotes.js"></script>
    <script src="app.js"></script>
</body>
</html>
